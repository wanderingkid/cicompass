<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CI Compass — Big Screen</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,400;0,700;0,900;1,900&family=Share+Tech+Mono&family=Orbitron:wght@500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg1:#07091f;--bg2:#0d1b4b;--bg3:#0a0e27;
  --surf:rgba(255,255,255,0.06);--surf2:rgba(255,255,255,0.1);
  --border:rgba(255,255,255,0.1);--border2:rgba(96,165,250,0.25);
  --blue:#3b82f6;--blue2:#60a5fa;--blue3:#93c5fd;
  --purple:#8b5cf6;--gold:#f59e0b;--gold2:#fbbf24;
  --green:#10b981;--red:#f43f5e;--cyan:#22d3ee;
  --text:#f8fafc;--text2:#94a3b8;--text3:#475569;
  --tc1:#60a5fa;--tc2:#a78bfa;--tc3:#fbbf24;
  --tc4:#34d399;--tc5:#fb7185;--tc6:#67e8f9;
  --glow-blue:0 0 30px rgba(59,130,246,0.3);
  --glow-gold:0 0 30px rgba(245,158,11,0.3);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100vw;height:100vh;overflow:hidden;
  background:linear-gradient(135deg,var(--bg1) 0%,var(--bg2) 100%);
  color:var(--text);font-family:'Kanit',sans-serif;}
body::before{content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse at 20% 10%,rgba(59,130,246,0.07) 0%,transparent 50%),
    radial-gradient(ellipse at 80% 90%,rgba(139,92,246,0.05) 0%,transparent 50%);
  pointer-events:none;z-index:0;}

/* ── HERO STRIP ── */
#hero-strip{
  position:fixed;top:0;left:0;right:0;height:76px;z-index:100;
  display:none;
  background:rgba(7,9,31,0.95);
  border-bottom:1px solid var(--border2);
  backdrop-filter:blur(12px);
}
.hero-cell{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:.25rem .4rem;
  border-right:1px solid rgba(255,255,255,0.04);
  position:relative;overflow:hidden;transition:all .6s;
}
.hero-cell:last-child{border:none;}
.hero-cell.rank1::after{content:'';position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(245,158,11,0.08),transparent);pointer-events:none;}
.hero-rank{font-size:.65rem;font-weight:700;opacity:.55;line-height:1;font-family:'Share Tech Mono',monospace;}
.hero-name{font-size:clamp(.6rem,1vw,.88rem);font-weight:900;line-height:1.1;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;}
.hero-score{font-size:clamp(.85rem,1.5vw,1.2rem);font-weight:900;
  font-family:'Share Tech Mono',monospace;color:var(--green);line-height:1;}
.hero-delta{font-size:.52rem;font-weight:700;line-height:1;min-height:.7rem;}
.hero-status{position:absolute;top:3px;right:4px;font-size:.6rem;}
.hero-cell.rank-up{animation:heroUp .5s ease-out;}
.hero-cell.rank-down{animation:heroDn .5s ease-out;}
@keyframes heroUp{from{transform:translateY(6px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes heroDn{from{transform:translateY(-6px);opacity:0}to{transform:translateY(0);opacity:1}}

/* ── MAIN ── */
#main{position:fixed;top:0;left:0;right:0;bottom:0;overflow:hidden;}
.view{position:absolute;inset:0;display:none;}
.view.active{display:flex;flex-direction:column;}

/* ── LOBBY ── */
/* ============================================================
   ARENA — LOBBY (RPC-004A: artwork is the stage, HTML is live data only)
   ============================================================ */
#v-lobby{align-items:stretch;justify-content:flex-start;gap:0;padding:0;position:absolute;inset:0;}
.arena-background{position:absolute;inset:0;background-size:cover;background-position:center;
  background-repeat:no-repeat;z-index:0;}
/* CSS-generated branding retired in favor of the supplied artwork — elements
   kept in the DOM (IDs preserved for initLogo()/JS) but visually hidden. */
.lobby-logo{display:none;}
.lobby-title{display:none;}
.lobby-sub{display:none;}
.lobby-pill{border-radius:24px;padding:.4rem 1.1rem;
  border:1px solid rgba(255,255,255,0.08);
  background:rgba(255,255,255,0.04);
  font-size:clamp(.65rem,1.1vw,.9rem);}
.lobby-count{color:var(--text3);font-size:clamp(.7rem,1.1vw,.9rem);}
.lobby-count span{color:var(--green);font-weight:900;font-size:1.3em;}

/* Overlay layer sits on top of .arena-background, positioned to align with
   the empty placeholder zones already composed into the artwork. */
.lobby-overlay{position:absolute;inset:0;z-index:1;}
.lobby-teams-v2{position:absolute;left:4.5%;right:4.5%;top:76.5%;height:11%;
  display:grid;grid-template-columns:repeat(6,1fr);}
.lobby-team-shield{display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
  gap:.3vh;padding:0 .4vw;}
.lobby-team-shield .lts-name{font-family:'Inter',sans-serif;
  font-size:clamp(.6rem,1vw,.9rem);font-weight:500;letter-spacing:.2px;line-height:1.1;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;}
.lobby-team-shield .lts-count{font-family:'Inter',sans-serif;
  font-size:clamp(.6rem,.95vw,.82rem);font-weight:300;color:rgba(255,255,255,.75);}
.lobby-total-row{position:absolute;left:33%;right:33%;top:91.5%;height:5.5%;
  display:flex;align-items:center;justify-content:center;}
.lobby-total-value{font-family:'Inter',sans-serif;
  font-size:clamp(1.1rem,2vw,1.8rem);font-weight:400;letter-spacing:2px;
  color:#fff;text-shadow:0 0 20px rgba(147,197,253,.5);}

/* ── DEMO ── */
#v-demo{align-items:center;justify-content:center;}
.demo-card{background:rgba(13,27,75,0.9);backdrop-filter:blur(20px);
  border:1px solid var(--border2);border-radius:clamp(16px,2vw,28px);
  padding:clamp(1.5rem,3vw,3.5rem);max-width:1000px;width:92%;
  box-shadow:var(--glow-blue);text-align:center;}
.demo-phase-lbl{font-size:clamp(.7rem,1.1vw,.9rem);color:var(--blue2);
  font-weight:700;letter-spacing:4px;margin-bottom:.5rem;}
.demo-h1{font-size:clamp(1.6rem,3.5vw,3.2rem);font-weight:900;margin-bottom:.8rem;line-height:1.15;}
.demo-prog{width:100%;height:3px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden;margin-bottom:1rem;}
.demo-prog-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--cyan));border-radius:2px;transition:width .1s linear;}
.demo-mockup-screen{background:rgba(0,0,0,0.3);border-radius:clamp(10px,1.5vw,18px);
  padding:clamp(1rem,2vw,2rem);margin:0 0 1rem;
  border:1px solid rgba(255,255,255,0.07);
  min-height:clamp(120px,18vh,200px);
  display:flex;align-items:center;justify-content:center;}
.demo-body-txt{font-size:clamp(.85rem,1.4vw,1.2rem);color:var(--text2);line-height:1.8;}
.demo-dots{display:flex;gap:.5rem;justify-content:center;margin-top:1rem;}
.demo-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.15);transition:all .3s;}
.demo-dot.on{background:var(--blue2);width:24px;border-radius:4px;}
.demo-hint{font-size:clamp(.6rem,.9vw,.78rem);color:var(--text3);margin-top:.8rem;}
/* Demo mock elements */
.dm-q{background:rgba(59,130,246,0.1);border:1px solid rgba(96,165,250,0.3);
  border-radius:12px;padding:.8rem;font-size:clamp(.8rem,1.3vw,1.1rem);
  font-weight:700;text-align:center;margin-bottom:.5rem;}
.dm-opt{background:rgba(255,255,255,0.06);border-radius:9px;padding:.5rem .8rem;
  font-size:clamp(.7rem,1.1vw,.9rem);font-weight:600;margin-bottom:.3rem;
  display:flex;align-items:center;gap:.5rem;border:1px solid var(--border);}
.dm-opt.ok{background:rgba(16,185,129,0.15);border-color:var(--green);color:var(--green);}
.dm-opt.no{opacity:.35;border-color:var(--red);}
.dm-terr{display:grid;grid-template-columns:repeat(15,1fr);gap:1px;border-radius:8px;overflow:hidden;}
.dm-cell{aspect-ratio:1;border-radius:1px;}

/* ── PHASE 1 RANKED LIST ── */
#v-phase1{padding:0;gap:0;justify-content:center;position:absolute;inset:0;}
@keyframes urgPulse{0%,100%{opacity:1}50%{opacity:.3}}

/* Center — live leaderboard as premium broadcast graphic (F1 timing / Dynamic
   Island language): glass rows, energy-conduit bars, restrained glow. */
.rank-row{
  display:flex;align-items:center;gap:1rem;
  background:linear-gradient(135deg,rgba(255,255,255,0.07),rgba(255,255,255,0.02));
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  border-radius:clamp(10px,1.2vw,16px);
  padding:clamp(.4rem,.7vw,.65rem) clamp(.8rem,1.5vw,1.5rem);
  border:1px solid rgba(255,255,255,0.09);
  position:relative;overflow:hidden;
  transition:all .7s cubic-bezier(.34,1.56,.64,1);
}
.rank-row.frozen{
  background:linear-gradient(135deg,rgba(96,165,250,0.22),rgba(30,58,138,0.12))!important;
  border-color:rgba(96,165,250,0.4)!important;
  animation:rShake .25s infinite;
}
@keyframes rShake{0%{transform:translateX(0)}33%{transform:translateX(-2px)}66%{transform:translateX(2px)}100%{transform:translateX(0)}}
.rank-num{font-size:clamp(1.2rem,2vw,2rem);font-weight:300;font-style:normal;
  min-width:clamp(2rem,3vw,3.2rem);text-align:center;line-height:1;opacity:.85;
  font-family:'Inter',sans-serif;}
.rank-name{font-family:'Inter',sans-serif;font-size:clamp(.8rem,1.2vw,1.1rem);font-weight:500;flex:1;line-height:1.1;
  letter-spacing:.3px;}
.rank-bar-wrap{flex:1.4;height:clamp(8px,1.1vw,12px);
  background:rgba(0,0,0,0.35);border-radius:20px;overflow:hidden;position:relative;
  border:1px solid rgba(255,255,255,.06);
  box-shadow:inset 0 1px 3px rgba(0,0,0,.4);}
.rank-bar{height:100%;border-radius:20px;position:relative;
  transition:width 1.1s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 0 12px 1px currentColor inset;}
.rank-bar::after{content:'';position:absolute;top:0;right:0;bottom:0;width:10px;
  background:rgba(255,255,255,.9);filter:blur(2.5px);border-radius:20px;}
.rank-score{font-family:'Inter',sans-serif;font-size:clamp(.7rem,1.1vw,.95rem);font-weight:600;
  letter-spacing:.5px;
  min-width:clamp(4rem,6vw,6.5rem);text-align:right;line-height:1;}
.rank-status{min-width:clamp(4rem,6vw,7rem);text-align:center;}
.frozen-tag{font-size:clamp(.55rem,.9vw,.78rem);color:#93c5fd;font-weight:600;
  background:rgba(30,58,138,0.4);border-radius:20px;
  padding:.12rem .5rem;display:inline-flex;align-items:center;gap:.25rem;}
.frozen-by-clr{font-weight:700;}

/* ── PHASE 2 TERRITORY ── */
#v-phase2{flex-direction:column;}
.p2-header{display:flex;align-items:center;justify-content:space-between;
  padding:.5rem 1.5rem;
  background:rgba(7,9,31,0.92);backdrop-filter:blur(8px);
  border-bottom:1px solid var(--border);flex-shrink:0;height:56px;}
.p2-label{font-size:clamp(.8rem,1.3vw,1rem);font-weight:900;
  color:var(--blue2);letter-spacing:2px;}
.p2-scores{display:flex;gap:.6rem;flex:1;justify-content:center;flex-wrap:wrap;}
.p2-tscore{font-size:clamp(.6rem,.95vw,.8rem);font-weight:700;
  padding:.15rem .5rem;border-radius:12px;
  background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);}
.p2-timer{font-family:'Share Tech Mono',monospace;
  font-size:clamp(1.4rem,2.3vw,2rem);font-weight:900;
  color:var(--blue2);}
.p2-timer.urgent{color:var(--red);animation:urgPulse .5s infinite;}
#territory-canvas{flex:1;width:100%;display:block;}
.p2-legend{display:flex;justify-content:center;gap:1.5rem;
  padding:.4rem 1rem;background:rgba(7,9,31,0.9);flex-shrink:0;}
.p2-leg{display:flex;align-items:center;gap:.4rem;
  font-size:clamp(.58rem,.9vw,.75rem);font-weight:700;}
.p2-leg-dot{width:12px;height:12px;border-radius:3px;}
/* Launch flash */
.launch-flash{position:fixed;inset:0;z-index:200;pointer-events:none;
  display:flex;align-items:center;justify-content:center;
  animation:lFlash .9s ease-out forwards;}
@keyframes lFlash{0%{opacity:0}15%{opacity:1}80%{opacity:1}100%{opacity:0}}
.launch-txt{font-size:clamp(2rem,6vw,6rem);font-weight:900;
  text-align:center;text-shadow:0 0 60px currentColor;
  animation:lPop .8s ease-out;}
@keyframes lPop{0%{transform:scale(.4)}60%{transform:scale(1.15)}100%{transform:scale(1)}}

/* ── PHASE 3 ── */
#v-phase3{padding:1rem 2rem;gap:.8rem;}
.p3-qnum{font-size:clamp(.7rem,1.1vw,.9rem);color:var(--blue2);
  font-weight:700;letter-spacing:3px;flex-shrink:0;}
.p3-stmt{font-size:clamp(1.6rem,3.8vw,4rem);font-weight:900;
  text-align:center;line-height:1.15;flex-shrink:0;
  max-width:1300px;align-self:center;}
.p3-choices{display:flex;gap:1.2rem;justify-content:center;flex-shrink:0;}
.p3-choice{padding:.7rem 2rem;border-radius:16px;
  font-size:clamp(.9rem,1.7vw,1.6rem);font-weight:900;
  border:2px solid transparent;transition:all .4s;}
.p3-choice.tc{background:rgba(16,185,129,0.08);border-color:var(--green);color:var(--green);}
.p3-choice.fc{background:rgba(244,63,94,0.08);border-color:var(--red);color:var(--red);}
.p3-choice.nc{background:rgba(245,158,11,0.08);border-color:var(--gold);color:var(--gold);}
.p3-choice.revealed{transform:scale(1.1);box-shadow:0 0 50px currentColor;}
.p3-subs{display:flex;gap:.6rem;justify-content:center;flex-wrap:wrap;flex-shrink:0;}
.p3-sub{padding:.22rem .65rem;border-radius:10px;
  font-size:clamp(.58rem,.9vw,.78rem);font-weight:700;
  background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);
  transition:all .3s;}
.p3-sub.done{background:rgba(16,185,129,0.1);border-color:var(--green);color:var(--green);}
.p3-panels{display:grid;grid-template-columns:repeat(3,1fr);gap:.7rem;flex:1;min-height:0;}
.p3-panel{background:rgba(255,255,255,0.04);border-radius:clamp(10px,1.5vw,18px);
  padding:clamp(.7rem,1.2vw,1.1rem);
  border:1px solid rgba(255,255,255,0.07);
  display:flex;flex-direction:column;gap:.3rem;
  transition:all .5s;position:relative;overflow:hidden;}
.p3-pname{font-size:clamp(.8rem,1.3vw,1.15rem);font-weight:900;line-height:1;}
.p3-pscore{font-size:clamp(1rem,1.8vw,1.6rem);font-weight:900;
  font-family:'Share Tech Mono',monospace;color:var(--green);line-height:1;}
.p3-pwager{font-size:clamp(.58rem,.9vw,.78rem);color:var(--text3);}
.p3-pdelta{font-size:clamp(.78rem,1.2vw,1.05rem);font-weight:900;min-height:1.1rem;}
.p3-pwpn{font-size:clamp(.62rem,.95vw,.8rem);min-height:.9rem;}
.p3-panel.correct-flash{animation:cFlash .7s ease-out;}
.p3-panel.wrong-flash{animation:wFlash .7s ease-out;}
.p3-panel.shield-flash{animation:sFlash .9s ease-out;}
.p3-panel.drain-flash{animation:dFlash .5s ease-out;}
.p3-panel.steal-flash{animation:stFlash .5s ease-out;}
@keyframes cFlash{0%{background:rgba(16,185,129,0.35)}100%{background:rgba(255,255,255,0.04)}}
@keyframes wFlash{0%{background:rgba(244,63,94,0.35)}100%{background:rgba(255,255,255,0.04)}}
@keyframes sFlash{0%{background:rgba(139,92,246,0.45);transform:scale(1.04)}100%{background:rgba(255,255,255,0.04);transform:scale(1)}}
@keyframes dFlash{0%{background:rgba(244,63,94,0.5)}100%{background:rgba(255,255,255,0.04)}}
@keyframes stFlash{0%{background:rgba(245,158,11,0.4)}100%{background:rgba(255,255,255,0.04)}}

/* ── LASER ── */
#laser-canvas{position:fixed;inset:0;pointer-events:none;z-index:150;}

/* ── SCOREBOARD ── */
#v-scoreboard{align-items:center;justify-content:center;gap:1.5rem;padding:1.5rem;}
.sb-title{font-size:clamp(1.4rem,3vw,3rem);font-weight:900;font-style:italic;
  background:linear-gradient(135deg,var(--blue2),var(--cyan));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  letter-spacing:2px;}
/* Top 3 podium cards */
.sb-top3{display:flex;gap:1rem;justify-content:center;width:100%;max-width:1400px;}
.sb-podium-card{border-radius:clamp(14px,1.8vw,24px);padding:1.5rem;
  display:flex;flex-direction:column;gap:.5rem;
  border:1px solid rgba(255,255,255,0.08);
  background:rgba(255,255,255,0.04);
  position:relative;overflow:hidden;
  transition:all .8s cubic-bezier(.34,1.56,.64,1);}
.sb-podium-card.rank1{
  flex:1.3;border-color:rgba(245,158,11,0.4);
  background:rgba(245,158,11,0.06);
  box-shadow:0 0 40px rgba(245,158,11,0.15);}
.sb-podium-card.rank2,.sb-podium-card.rank3{flex:1;}
.sb-podium-badge{font-size:clamp(2rem,4vw,4.5rem);font-weight:900;
  font-style:italic;line-height:1;opacity:.9;}
.sb-podium-rank-label{font-size:clamp(.65rem,1vw,.85rem);font-weight:700;
  color:var(--text3);letter-spacing:2px;text-transform:uppercase;}
.sb-podium-name{font-size:clamp(1.2rem,2vw,2rem);font-weight:900;line-height:1.1;}
.sb-podium-score{font-size:clamp(1.6rem,2.8vw,2.8rem);font-weight:900;
  font-family:'Share Tech Mono',monospace;color:var(--green);line-height:1;}
.sb-podium-phases{display:flex;gap:.4rem;flex-wrap:wrap;}
.sb-phase-tag{font-size:clamp(.55rem,.85vw,.72rem);padding:.12rem .4rem;
  border-radius:6px;background:rgba(255,255,255,0.07);font-weight:700;}
.sb-podium-bar-wrap{height:6px;background:rgba(0,0,0,0.3);
  border-radius:3px;overflow:hidden;margin-top:.2rem;}
.sb-podium-bar{height:6px;border-radius:3px;
  transition:width 1.5s cubic-bezier(.34,1.56,.64,1);}
/* Bottom 3 rows */
.sb-bottom3{display:flex;flex-direction:column;gap:.5rem;width:100%;max-width:1400px;}
.sb-rank-row{display:flex;align-items:center;gap:1rem;
  background:rgba(255,255,255,0.04);
  border-radius:clamp(8px,1.2vw,16px);
  padding:clamp(.5rem,.9vw,.85rem) clamp(.8rem,1.5vw,1.5rem);
  border:1px solid rgba(255,255,255,0.06);}
.sb-rr-badge{font-size:clamp(1.4rem,2.8vw,3rem);font-weight:900;
  font-style:italic;min-width:clamp(2.5rem,4vw,4rem);
  text-align:center;line-height:1;opacity:.85;}
.sb-rr-name{font-size:clamp(.9rem,1.6vw,1.5rem);font-weight:900;flex:1;line-height:1.1;}
.sb-rr-phases{display:flex;gap:.35rem;}
.sb-rr-score{font-size:clamp(.85rem,1.5vw,1.4rem);font-weight:900;
  font-family:'Share Tech Mono',monospace;color:var(--green);
  min-width:clamp(5rem,8vw,9rem);text-align:right;}
.sb-rr-bar-wrap{flex:1;height:10px;background:rgba(0,0,0,0.25);
  border-radius:5px;overflow:hidden;}
.sb-rr-bar{height:10px;border-radius:5px;
  transition:width 1.5s cubic-bezier(.34,1.56,.64,1);}

/* ── DEBRIEF 1 ── */
#v-debrief1{align-items:center;justify-content:center;gap:1.2rem;padding:1.2rem;}
.db1-title{font-size:clamp(1.3rem,2.5vw,2.5rem);font-weight:900;font-style:italic;
  color:var(--blue2);letter-spacing:2px;}
.db1-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.8rem;
  width:100%;max-width:1400px;}
.db1-card{border-radius:clamp(12px,1.5vw,22px);padding:clamp(.9rem,1.5vw,1.5rem);
  background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);
  display:flex;flex-direction:column;gap:.4rem;}
.db1-name{font-size:clamp(1rem,1.7vw,1.6rem);font-weight:900;line-height:1;}
.db1-acc{font-size:clamp(2rem,4vw,4rem);font-weight:900;
  font-family:'Share Tech Mono',monospace;line-height:1;}

/* ============================================================

.chud-svg{
  --chud-electric-blue:#3b82f6;--chud-cyan:#22d3ee;--chud-ice-blue:#93c5fd;
  --chud-slate:#64748b;--chud-royal-purple:#8b5cf6;
  --chud-victory-gold:#fbbf24;--chud-victory-gold-2:#fde68a;
  --chud-white:#f8fafc;--chud-bg:#0a0e27;
  --chud-primary-color:var(--chud-electric-blue);
  --chud-needle-angle:12deg;--chud-team-color:transparent;
  --chud-charge:0;--chud-sweep-duration:8s;
  width:100%;height:100%;overflow:visible;display:block;
}
.chud-ring-stroke{fill:none;stroke:var(--chud-primary-color);stroke-width:1.5px;
  vector-effect:non-scaling-stroke;opacity:.5;transition:stroke .4s ease,opacity .4s ease;}
#chud-outer-ring-circle{stroke-width:2px;}
.chud-static-mark{stroke:var(--chud-slate);stroke-width:1px;vector-effect:non-scaling-stroke;opacity:.55;fill:none;}
.chud-tick{stroke:var(--chud-ice-blue);vector-effect:non-scaling-stroke;transition:opacity .4s ease,stroke .4s ease;}
.chud-tick-major{stroke-width:2.4px;opacity:.95;}
.chud-tick-minor{stroke-width:.6px;opacity:.25;}
.chud-microscale line,#chud-microscale line{stroke:var(--chud-ice-blue);stroke-width:.35px;opacity:.3;vector-effect:non-scaling-stroke;}
.chud-glass{pointer-events:none;}
.chud-particle{fill:var(--chud-primary-color);opacity:.35;}
.chud-team-arc{fill:none;stroke:var(--chud-team-color);stroke-width:1.5px;vector-effect:non-scaling-stroke;opacity:0;transition:opacity .5s ease;}
.chud-svg[data-has-team="true"] .chud-team-arc{opacity:.95;}
#chud-needle{transform-box:view-box;transform-origin:100px 100px;transform:rotate(var(--chud-needle-angle));
  transition:transform .45s cubic-bezier(.34,1.56,.64,1);}
.chud-needle-blade{fill:var(--chud-primary-color);stroke:var(--chud-primary-color);stroke-width:1px;
  transition:fill .4s ease,stroke .4s ease;filter:drop-shadow(0 0 2px var(--chud-primary-color));}
.chud-needle-facet{stroke:var(--chud-bg);stroke-width:.5px;opacity:.4;vector-effect:non-scaling-stroke;}
.chud-needle-reticle line{stroke:var(--chud-primary-color);stroke-width:.8px;opacity:.28;vector-effect:non-scaling-stroke;transition:stroke .4s ease;}
#chud-core{transform-box:view-box;transform-origin:100px 100px;}
.chud-core-ring-outer{fill:none;stroke:var(--chud-primary-color);stroke-width:.5px;vector-effect:non-scaling-stroke;opacity:.15;}
.chud-core-iris{fill:none;stroke:var(--chud-primary-color);stroke-width:1px;vector-effect:non-scaling-stroke;opacity:.6;transition:stroke .4s ease;}
.chud-core-halo{fill:var(--chud-primary-color);opacity:.35;transition:fill .4s ease;filter:drop-shadow(0 0 3px var(--chud-primary-color));}
.chud-core-dot{fill:var(--chud-white);opacity:.85;filter:drop-shadow(0 0 3px var(--chud-primary-color));}
.chud-polaris-mark{fill:var(--chud-victory-gold);animation:chud-polaris-pulse 5.4s ease-in-out infinite;}
.chud-polaris-mark--icon{animation:none;opacity:.85;}
@keyframes chud-polaris-pulse{0%,100%{opacity:.7}50%{opacity:1}}
.chud-sweep{transform-box:view-box;transform-origin:100px 100px;animation:chud-sweep-spin var(--chud-sweep-duration) linear infinite;}
.chud-sweep-seg{fill:none;stroke:var(--chud-primary-color);stroke-width:1.2px;stroke-linecap:round;vector-effect:non-scaling-stroke;opacity:var(--seg-op,.5);}
@keyframes chud-sweep-spin{to{transform:rotate(360deg)}}
[data-state="idle"] .chud-core-halo,[data-state="idle"] .chud-core-dot{animation:chud-breathe-core 4s ease-in-out infinite;}
[data-state="idle"] .chud-needle-blade{animation:chud-breathe-needle-echo 4s ease-in-out infinite;}
@keyframes chud-breathe-core{0%,100%{opacity:.55}50%{opacity:.68}}
@keyframes chud-breathe-needle-echo{0%,100%{filter:drop-shadow(0 0 1.4px var(--chud-primary-color))}50%{filter:drop-shadow(0 0 2.2px var(--chud-primary-color))}}
[data-state="charging"]{--chud-primary-color:var(--chud-cyan);--chud-sweep-duration:calc(7s - (5s * var(--chud-charge)));}
[data-state="charging"] #chud-needle{animation:chud-charging-rotate 5s linear infinite;}
[data-state="charging"] .chud-core-halo,[data-state="charging"] .chud-core-dot{opacity:calc(.4 + .5 * var(--chud-charge));}
[data-state="charging"] #chud-core-ring-outer{animation:chud-sweep-spin 6s linear infinite;opacity:.3;}
@keyframes chud-charging-rotate{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
[data-state="charging"] #chud-inner-ring-circle{stroke:var(--chud-cyan);stroke-dasharray:calc(377 * var(--chud-charge)) 377;
  transform:rotate(-90deg);transform-box:view-box;transform-origin:100px 100px;opacity:.8;}
[data-state="ready"]{--chud-needle-angle:0deg;}
[data-state="ready"] .chud-core-dot{animation:chud-ready-flash .7s ease-out 1;}
[data-state="ready"] .chud-ready-pulse{fill:none;stroke:var(--chud-white);stroke-width:1px;vector-effect:non-scaling-stroke;animation:chud-ready-pulse-expand .8s ease-out 1;}
@keyframes chud-ready-flash{0%{fill:var(--chud-white);opacity:.85}30%{fill:#fff;opacity:1;filter:drop-shadow(0 0 5px #fff)}100%{fill:var(--chud-white);opacity:1}}
@keyframes chud-ready-pulse-expand{0%{r:60;opacity:.5}100%{r:95;opacity:0}}
[data-state="freeze"]{--chud-primary-color:var(--chud-ice-blue);--chud-needle-angle:180deg;}
[data-state="freeze"] .chud-sweep{animation-play-state:paused;opacity:0;}
[data-state="freeze"] .chud-ring-stroke,[data-state="freeze"] .chud-tick{filter:saturate(.35);}
[data-state="freeze"] .chud-core-halo,[data-state="freeze"] .chud-core-dot,[data-state="freeze"] .chud-needle-blade{animation:none;}
[data-state="freeze"] .chud-core-halo{opacity:.2;}
[data-state="freeze"] .chud-freeze-fx{opacity:1;}
[data-state="freeze"] .chud-freeze-crystal{stroke:var(--chud-ice-blue);stroke-width:.7px;vector-effect:non-scaling-stroke;opacity:0;animation:chud-freeze-crystallize .3s ease-out forwards;}
[data-state="freeze"] .chud-freeze-countdown{fill:none;stroke:var(--chud-ice-blue);stroke-width:1.8px;vector-effect:non-scaling-stroke;opacity:.7;
  transform:rotate(-90deg);transform-box:view-box;transform-origin:100px 100px;stroke-dasharray:377;stroke-dashoffset:0;animation:chud-freeze-deplete 12s linear forwards;}
.chud-freeze-fx{opacity:0;transition:opacity .2s ease;}
@keyframes chud-freeze-crystallize{from{opacity:0;transform:scale(.6)}to{opacity:.6;transform:scale(1)}}
@keyframes chud-freeze-deplete{from{stroke-dashoffset:0}to{stroke-dashoffset:377}}
[data-state="signal-lost"]{--chud-primary-color:var(--chud-slate);}
[data-state="signal-lost"] .chud-ring-stroke,[data-state="signal-lost"] .chud-tick,[data-state="signal-lost"] .chud-needle-blade,
[data-state="signal-lost"] .chud-core-halo,[data-state="signal-lost"] .chud-core-dot{filter:grayscale(1);animation:chud-signal-flicker 1.2s steps(6,end) infinite;}
[data-state="signal-lost"] #chud-needle{animation:chud-signal-jitter .4s ease-in-out 1,chud-signal-droop .3s ease-out .4s forwards;}
[data-state="signal-lost"] .chud-sweep{animation:chud-sweep-spin 8s steps(10,end) infinite;}
@keyframes chud-signal-flicker{0%,100%{opacity:1}10%{opacity:.4}20%{opacity:1}35%{opacity:.7}50%{opacity:1}70%{opacity:.5}}
@keyframes chud-signal-jitter{0%,100%{transform:rotate(0deg)}20%{transform:rotate(8deg)}40%{transform:rotate(-6deg)}60%{transform:rotate(5deg)}80%{transform:rotate(-8deg)}}
@keyframes chud-signal-droop{to{transform:rotate(14deg)}}
[data-state="deploy"]{--chud-needle-angle:0deg;}
[data-state="deploy"] #chud-needle{transition:transform .3s cubic-bezier(.34,1.8,.5,1);}
[data-state="deploy"] #chud-core{animation:chud-deploy-core-response .4s ease-out 1;}
[data-state="deploy"] .chud-deploy-fx{opacity:1;}
[data-state="deploy"] .chud-deploy-ring{fill:none;stroke-width:1.2px;vector-effect:non-scaling-stroke;
  stroke:color-mix(in srgb,var(--chud-electric-blue) 60%,var(--chud-royal-purple));opacity:0;animation:chud-deploy-propagate .5s ease-out forwards;}
.chud-deploy-ring-1{animation-delay:0s;}.chud-deploy-ring-2{animation-delay:.06s;}.chud-deploy-ring-3{animation-delay:.12s;}
.chud-deploy-fx{opacity:0;}
@keyframes chud-deploy-propagate{0%{r:20;opacity:.65}100%{r:130;opacity:0}}
@keyframes chud-deploy-core-response{0%{transform:scale(1)}25%{transform:scale(.92)}60%{transform:scale(1.05)}100%{transform:scale(1)}}
[data-state="victory"]{--chud-primary-color:var(--chud-victory-gold);}

[data-state="victory"] .chud-tick-major{animation:chud-victory-tick-wave .4s ease-out 1;animation-delay:calc(var(--tick-index,0) * 15ms);}
@keyframes chud-victory-bloom{0%{opacity:.4}40%{opacity:1;filter:drop-shadow(0 0 6px var(--chud-victory-gold))}100%{opacity:.85}}
@keyframes chud-victory-tick-wave{0%,100%{opacity:.95}50%{opacity:1;filter:drop-shadow(0 0 3px var(--chud-victory-gold))}}
[data-state="champion"]{--chud-primary-color:var(--chud-victory-gold);--chud-needle-angle:0deg;}

function hexRgb(hex){
  if(!hex)return '255,255,255';
  const h=hex.replace('#','');
  const bigint=parseInt(h.length===3?h.split('').map(c=>c+c).join(''):h,16);
  return `${(bigint>>16)&255},${(bigint>>8)&255},${bigint&255}`;
}

function tone(f,d,t='sine',v=.1,dl=0){
  if(!audioCtx||!musicOn)return;
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.connect(g);g.connect(audioCtx.destination);
  o.type=t;o.frequency.setValueAtTime(f,audioCtx.currentTime+dl);
  g.gain.setValueAtTime(v,audioCtx.currentTime+dl);
  g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+dl+d);
  o.start(audioCtx.currentTime+dl);o.stop(audioCtx.currentTime+dl+d);
}

// TIMER
function startTimer(elId,phase){
  if(timerInt)clearInterval(timerInt);
  const dur=(phase===1&&gs?.phase1_duration)||PHASE_DUR[phase]||0;if(!dur)return;
  timerInt=setInterval(()=>{
    if(!gs?.phase_start_at)return;
    const elapsed=(Date.now()-new Date(gs.phase_start_at).getTime())/1000;
    const rem=Math.max(0,dur-elapsed);
    const m=Math.floor(rem/60),s=Math.floor(rem%60);
    const el=document.getElementById(elId);
    if(el){el.textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;el.classList.toggle('urgent',rem<=30);}
    if(rem<=0)clearInterval(timerInt);
  },500);
}

// RPC-007D — shared FLIP-style reorder animation, used by every
// leaderboard (Mission Leaderboard, Mission Result, Tournament Standings).
// Reuses existing row nodes (keyed by team id) rather than recreating them,
// then animates any position change with a single transform transition.
function flipReorder(containerId,sortedTeams,rowContentFn){
  const container=document.getElementById(containerId);
  if(!container)return;
  const firstTops={};
  container.querySelectorAll('[data-team-id]').forEach(row=>{
    firstTops[row.dataset.teamId]=row.getBoundingClientRect().top;
  });
  sortedTeams.forEach((t,i)=>{
    let row=container.querySelector(`[data-team-id="${t.id}"]`);
    if(!row){row=document.createElement('div');row.dataset.teamId=t.id;}
    rowContentFn(row,t,i);
    container.appendChild(row);
  });
  container.querySelectorAll('[data-team-id]').forEach(row=>{
    const first=firstTops[row.dataset.teamId];
    if(first==null)return;
    const last=row.getBoundingClientRect().top;
    const delta=first-last;
    if(Math.abs(delta)>0.5){
      row.style.transition='none';
      row.style.transform=`translateY(${delta}px)`;
      requestAnimationFrame(()=>{
        row.style.transition='transform 350ms ease';
        row.style.transform='';
      });
    }
  });
}

function renderRankList(){
  const sorted=[...teams].sort((a,b)=>(b.total_score||0)-(a.total_score||0));
  const maxScore=Math.max(1,...teams.map(t=>t.total_score||0));
  const poolLbl=document.getElementById('p1-pool-lbl');
  if(poolLbl)poolLbl.textContent=triviaQs.length?`${triviaQs.length} QUESTIONS IN PLAY`:'';
  flipReorder('p1-lb',sorted,(row,t,rank)=>{
    row.id=`rr-${t.id}`;
    const clr=TC[t.id]||'#fff';
    const frozen=t.frozen_until&&new Date(t.frozen_until)>new Date();
    const nm=t.leader_name||t.name;
    const pct=Math.max(4,((t.total_score||0)/maxScore)*86);
    row.className=`rank-row${frozen?' frozen':''}`;
    row.style.background=frozen?'rgba(30,58,138,0.2)':`rgba(${hexRgb(clr)},.04)`;
    row.style.borderColor=frozen?'rgba(96,165,250,0.35)':`rgba(${hexRgb(clr)},.12)`;
    const byTeam=frozen&&t.frozen_by_team?teams.find(x=>x.id===t.frozen_by_team):null;
    const byName=byTeam?(byTeam.leader_name||byTeam.name):'';
    const byClr=byTeam?TC[byTeam.id]||'#fff':'#fff';
    const frozenRem=frozen?Math.max(0,Math.ceil((new Date(t.frozen_until).getTime()-Date.now())/1000)):0;
    row.innerHTML=`
      <div class="rank-num" style="color:${clr};">${MEDALS[rank]||rank+1}</div>
      <div style="flex:1.4;min-width:0;">
        <div class="rank-name" style="color:${clr};">${nm}</div>
        ${frozen?`<div class="frozen-tag">❄️ Frozen by <span class="frozen-by-clr" style="color:${byClr}">${byName}</span> · ${frozenRem}s</div>`:''}
        ${t.weapon_charges>0&&!frozen?`<div class="rr-freeze-ready">⚡ FREEZE READY ×${t.weapon_charges}</div>`:''}
      </div>
      <div class="rank-bar-wrap">
        <div class="rank-bar" style="width:${pct}%;background:linear-gradient(90deg,${clr}66,${clr});color:${clr};"></div>
      </div>
      <div class="rank-score" style="color:${clr};">${(t.total_score||0).toLocaleString()}</div>`;
  });
  startFrozenCountdowns();
}
function startFrozenCountdowns(){
  teams.forEach(t=>{
    if(t.frozen_until&&new Date(t.frozen_until)>new Date()){
      const end=new Date(t.frozen_until).getTime();
      const iv=setInterval(()=>{
        const row=document.getElementById(`rr-${t.id}`);
        if(!row){clearInterval(iv);return;}
        const rem=Math.max(0,Math.ceil((end-Date.now())/1000));
        const tag=row.querySelector('.frozen-tag');
        if(tag){
          const byTeam=teams.find(x=>x.id===t.frozen_by_team);
          const byName=byTeam?(byTeam.leader_name||byTeam.name):'';
          const byClr=byTeam?TC[byTeam.id]||'#fff':'#fff';
          tag.innerHTML=`❄️ Frozen by <span class="frozen-by-clr" style="color:${byClr}">${byName}</span> · ${rem}s`;
        }
        if(rem<=0)clearInterval(iv);
      },500);
    }
  });
}
function checkFreezeEvents(prev){
  const nowFrz=teams.filter(t=>t.frozen_until&&new Date(t.frozen_until)>new Date()).map(t=>t.id);
  if(nowFrz.some(id=>!prevFrozen.includes(id)))sfxFreeze();
  prevFrozen=nowFrz;
}

let freezeQueue=[],freezeShowing=false;
function showFreezeOverlay(attackerId,targetId){
  // Queue — never overlap multiple freeze announcements (RPC-007B).
  freezeQueue.push({attackerId,targetId});
  processFreezeQueue();
}
function processFreezeQueue(){
  if(freezeShowing||!freezeQueue.length)return;
  freezeShowing=true;
  const{attackerId,targetId}=freezeQueue.shift();
  enterFreezeEventView(attackerId,targetId);
}
function enterFreezeEventView(attackerId,targetId){
  sfxFreeze();
  document.getElementById('fe-attacker-name').textContent=tName(attackerId);
  document.getElementById('fe-target-name').textContent=tName(targetId);
  showView('v-freeze-event');
  if(freezeEventInt)clearInterval(freezeEventInt);
  // Announcement displays ~5s regardless of the actual (12s) freeze duration —
  // the freeze effect itself continues independently in the background;
  // this is just the broadcast moment. See ARENA.md §5.
  let remaining=5;
  const tick=()=>{
    const el=document.getElementById('fe-countdown');
    if(el){el.textContent=remaining;el.classList.toggle('urgent',remaining<=2&&remaining>0);}
    if(remaining<=0){
      clearInterval(freezeEventInt);freezeEventInt=null;
      freezeShowing=false;
      if(gs?.phase===1)showView('v-phase1');
      processFreezeQueue(); // play next queued freeze, if any
      return;
    }
    remaining--;
  };
  tick();
  freezeEventInt=setInterval(tick,1000);
}

// Phase 3 reveal sequence
async function runP3Reveal(qi,correctAnswer,subs){
  const ansMap={true:'p3-true',false:'p3-false',notsure:'p3-notsure'};
  document.getElementById(ansMap[correctAnswer]||'p3-true')?.classList.add('revealed');
  sfxCorrect();await sleep(1500);
  // Wager results (non-multiplier first)
  for(const s of subs.filter(x=>!x.use_multiplier)){
    const ok=s.answer===correctAnswer,ns=s.answer==='notsure';
    const pan=document.getElementById(`pp-${s.team_id}`);
    const wd=document.getElementById(`ppw-${s.team_id}`);
    const dd=document.getElementById(`ppd-${s.team_id}`);
    if(wd)wd.textContent=`Wager: ${(s.wager||0).toLocaleString()}`;
    if(ns){if(dd){dd.textContent='0 (ไม่แน่ใจ)';dd.style.color='var(--text3)';}}
    else if(ok){pan?.classList.add('correct-flash');if(dd){dd.textContent=`+${(s.wager||0).toLocaleString()}`;dd.style.color='var(--green)';} sfxCorrect();}
    else{pan?.classList.add('wrong-flash');if(dd){dd.textContent=`−${(s.wager||0).toLocaleString()}`;dd.style.color='var(--red)';} sfxWrong();}
  }
  await sleep(1800);
  // Multiplier
  const ms=subs.find(x=>x.use_multiplier);
  if(ms){
    const ok=ms.answer===correctAnswer;
    const pan=document.getElementById(`pp-${ms.team_id}`);
    const wpn=document.getElementById(`ppwpn-${ms.team_id}`);
    const wd=document.getElementById(`ppw-${ms.team_id}`);
    const dd=document.getElementById(`ppd-${ms.team_id}`);
    pan?.classList.add('shield-flash');
    if(wpn)wpn.innerHTML='🛡️ <span style="color:var(--gold)">SHIELD ×2!</span>';
    if(wd)wd.textContent=`Wager: ${(ms.wager||0).toLocaleString()}`;
    const pts=ok?(ms.wager||0)*2:-(ms.wager||0);
    if(dd){dd.textContent=ok?`+${pts.toLocaleString()} (×2!)`:`−${(ms.wager||0).toLocaleString()}`;dd.style.color=ok?'var(--gold)':'var(--red)';}
    showBigMsg(`🛡️ ${tName(ms.team_id)} SHIELD ×2!`,TC[ms.team_id]||'#fff');
    sfxShield();await sleep(2200);
  }
  // Takeovers
  const tkSubs=subs.filter(s=>s.use_takeover&&s.answer===correctAnswer&&s.takeover_target);
  for(let i=0;i<tkSubs.length;i++){
    const s=tkSubs[i];
    document.getElementById(`pp-${s.takeover_target}`)?.classList.add('drain-flash');
    document.getElementById(`pp-${s.team_id}`)?.classList.add('steal-flash');
    drawLaser(s.team_id,s.takeover_target,TC[s.team_id]||'#fff');
    sfxTakeover();
    const msg=i>0&&tkSubs[i-1].takeover_target===s.takeover_target
      ?`💣 OH NO — AGAIN! ${tName(s.team_id)} hits ${tName(s.takeover_target)}!`
      :`💣 ${tName(s.team_id)} STEALS 3,000 from ${tName(s.takeover_target)}!`;
    showBigMsg(msg,TC[s.team_id]||'#fff');
    addFeed(msg);
    await sleep(2000);
    if(i<tkSubs.length-1)await sleep(1500);
  }
  await loadTeams();updateHeroStrip();updateP3Panels();
}

async function revealNextTeam(){
  if(p3RevealIdx>=p3RevealQueue.length)return;
  const t=p3RevealQueue[p3RevealIdx];
  const pan=document.getElementById(`pp-${t.id}`);
  const sc=document.getElementById(`pps-${t.id}`);

  if(sc)sc.textContent=(t.total_score||0).toLocaleString();

  addFeed(`${MEDALS[p3RevealQueue.length-1-p3RevealIdx]||''} ${t.leader_name||t.name}: ${(t.total_score||0).toLocaleString()} pts`);

  if(p3AutoReveal&&p3RevealIdx<p3RevealQueue.length){await sleep(3000);revealNextTeam();}
}
async function autoRevealAll(){p3AutoReveal=true;while(p3RevealIdx<p3RevealQueue.length){await revealNextTeam();if(p3RevealIdx<p3RevealQueue.length)await sleep(3000);}}
